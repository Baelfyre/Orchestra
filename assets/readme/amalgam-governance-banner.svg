<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="100%">
    <defs>
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#050505" />
            <stop offset="100%" stop-color="#111111" />
        </linearGradient>
        <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#9a7b32" />
            <stop offset="50%" stop-color="#dfc776" />
            <stop offset="100%" stop-color="#9a7b32" />
        </linearGradient>
        <linearGradient id="gold-fade" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(223, 199, 118, 0)" />
            <stop offset="50%" stop-color="rgba(223, 199, 118, 0.4)" />
            <stop offset="100%" stop-color="rgba(223, 199, 118, 0)" />
        </linearGradient>
    </defs>
    
    <!-- Background -->
    <rect width="1200" height="300" fill="url(#bg-grad)" />
    
    <!-- Abstract rings representing governance boundaries -->
    <circle cx="600" cy="150" r="450" fill="none" stroke="url(#gold-fade)" stroke-width="1" />
    <circle cx="600" cy="150" r="300" fill="none" stroke="url(#gold-fade)" stroke-width="1.5" />
    <circle cx="600" cy="150" r="150" fill="none" stroke="url(#gold-fade)" stroke-width="2" />
    
    <!-- Orchestration lines -->
    <path d="M0 150 Q 300 50 600 150 T 1200 150" fill="none" stroke="url(#gold-grad)" stroke-width="2" opacity="0.7" />
    <path d="M0 170 Q 400 250 800 170 T 1200 170" fill="none" stroke="url(#gold-grad)" stroke-width="1" opacity="0.3" />
    
    <!-- Center node -->
    <circle cx="600" cy="150" r="4" fill="#dfc776" />
    <circle cx="300" cy="100" r="3" fill="#dfc776" opacity="0.6" />
    <circle cx="900" cy="200" r="3" fill="#dfc776" opacity="0.6" />
</svg>
